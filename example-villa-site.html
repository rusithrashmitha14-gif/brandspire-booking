<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Oceanfront Villa | Luxury Getaway</title>
    <!-- Use some basic fonts to make it look nice -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #333;
            background-color: #fafafa;
        }
        header {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin: 0;
            letter-spacing: 2px;
        }
        p.subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 600px;
            margin: 20px auto;
        }
        .container {
            max-width: 1200px;
            margin: -60px auto 50px auto;
            padding: 0 20px;
            position: relative;
        }
        .widget-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #eee;
        }
        /* Important: The iframe should be 100% width and tall enough to fit the widget */
        .booking-iframe {
            width: 100%;
            height: 900px; /* Adjust height as needed, or use a responsive resize script */
            border: none;
            display: block;
        }
        .features {
            display: flex;
            justify-content: space-around;
            padding: 60px 20px;
            text-align: center;
            background: white;
            margin-top: 40px;
        }
        .feature h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .feature p {
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Oceanfront Villa</h1>
        <p class="subtitle">Experience ultimate luxury and relaxation at our private beachfront estate.</p>
    </header>

    <div class="container">
        <!-- 
        THIS IS WHERE YOU EMBED YOUR BRANDSPIRE BOOKING WIDGET 
        Make sure to replace [YOUR_PROPERTY_ID] with your actual property's unique ID!
        -->
        <div class="widget-container">
            <iframe src="http://localhost:5173/embed/property-irmano" width="100%" height="900px" style="border:none;"></iframe>
        </div>
    </div>

    <div class="features">
        <div class="feature">
            <h3>Private Beach</h3>
            <p>Direct access to pristine white sands.</p>
        </div>
        <div class="feature">
            <h3>Infinity Pool</h3>
            <p>Swim while overlooking the ocean.</p>
        </div>
        <div class="feature">
            <h3>24/7 Concierge</h3>
            <p>We cater to your every need.</p>
        </div>
    </div>

    <script>
        // Note: In a real production site, you would replace 'http://localhost:5173' 
        // with your live Vercel URL, for example:
        // src="https://brandspire-booking.vercel.app/embed/YOUR_PROPERTY_ID"
    </script>
</body>
</html>
